[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["corepack enable", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm run build"]

[start]
cmd = "sh -c 'if [ -n \"$DATABASE_URL\" ]; then pnpm prisma:deploy; else echo \"DATABASE_URL is not set; skipping migrations\"; fi; node dist/index.js'"
