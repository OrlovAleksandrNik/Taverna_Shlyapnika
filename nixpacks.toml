[phases.setup]
nixPkgs = ["jdk21", "maven"]

[phases.build]
cmds = [
  "cd apps/backend-java && mvn -B -DskipTests package",
  "mkdir -p .railway/static-site",
  "cp -R assets data masters .railway/static-site/",
  "cp *.html robots.txt sitemap.xml styles.css script.js .railway/static-site/"
]

[variables]
SPRING_PROFILES_ACTIVE = "prod"
SERVE_FRONTEND = "true"
FRONTEND_STATIC_DIR = "/app/.railway/static-site"
FILE_STORAGE_DIR = "/app/uploads"
PUBLIC_UPLOADS_URL = "/uploads"

[start]
cmd = "java -jar apps/backend-java/target/shlyapnika-backend-0.1.0.jar"
