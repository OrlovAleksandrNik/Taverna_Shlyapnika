name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Validate Prisma schema
        run: pnpm validate:prisma

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  java-backend:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x apps/backend-java/mvnw

      - name: Verify Java backend
        working-directory: apps/backend-java
        run: ./mvnw -B verify -Dskip.integration.tests=false -Djacoco.skip=false

      - name: Build Java backend Docker image
        run: docker build -t taverna-shlyapnika-backend-java:test apps/backend-java

      - name: Upload Java test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-backend-test-reports
          path: |
            apps/backend-java/target/surefire-reports
            apps/backend-java/target/failsafe-reports
            apps/backend-java/target/site/jacoco

  java-telegram-bot:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x apps/telegram-bot-java/mvnw

      - name: Test Java Telegram bot
        working-directory: apps/telegram-bot-java
        run: ./mvnw -B test

      - name: Build Java Telegram bot Docker image
        run: docker build -t taverna-shlyapnika-telegram-bot-java:test apps/telegram-bot-java

      - name: Upload Java Telegram bot test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-telegram-bot-test-reports
          path: apps/telegram-bot-java/target/surefire-reports
